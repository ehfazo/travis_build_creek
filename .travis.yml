language: android

dist: focal

os: linux

env:
  global:
    - ANDROID_COMPILE_SDK=35
    - ANDROID_BUILD_TOOLS=35.0.0
    - ANDROID_SDK_TOOLS=11076708
    - TG_TOKEN=$TG_TOKEN
    - TG_CHAT=$TG_CHAT
    - PIXELDRAIN=$PIXELDRAIN

before_install:
  - sudo apt-get update
  - sudo apt-get install -y bc build-essential zip curl libstdc++6 git wget python3 python3-pip repo
  - chmod +x travis_build.sh

script:
  - ./travis_build.sh

notifications:
  email: false