name: Trigger Travis CI Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  trigger-travis:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Travis CI Build
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -H "Travis-API-Version: 3" \
            -H "Authorization: token ${{ secrets.TRAVIS_ACCESS_TOKEN }}" \
            -d '{
              "request": {
                "branch": "main",
                "message": "Triggered by GitHub Actions commit ${{ github.sha }}"
              }
            }' \
            "https://developer.travis-ci.com/repo/${{ secrets.TRAVIS_REPO_SLUG }}/requests"